<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-labelledby="aitrace-title aitrace-desc">
  <title id="aitrace-title">AITrace</title>
  <desc id="aitrace-desc">A hexagonal execution-cinema lens with trace spans, causal graph, replay playhead, redaction spillover refs, and export receipt.</desc>
  <defs>
    <clipPath id="aitrace-hex">
      <path d="M100 4 L183 52 L183 148 L100 196 L17 148 L17 52 Z"/>
    </clipPath>
    <radialGradient id="aitrace-bg" cx="50%" cy="44%" r="72%">
      <stop offset="0" stop-color="#183e5e"/>
      <stop offset="0.55" stop-color="#101a2d"/>
      <stop offset="1" stop-color="#080a10"/>
    </radialGradient>
    <linearGradient id="aitrace-lens" x1="48" y1="64" x2="152" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#91f7ff"/>
      <stop offset="0.48" stop-color="#bba0ff"/>
      <stop offset="1" stop-color="#ffd36e"/>
    </linearGradient>
    <filter id="aitrace-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g clip-path="url(#aitrace-hex)">
    <path d="M100 4 L183 52 L183 148 L100 196 L17 148 L17 52 Z" fill="url(#aitrace-bg)"/>
    <g stroke="#91f7ff" stroke-width="1.6" opacity="0.26" fill="none">
