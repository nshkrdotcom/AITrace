      <rect x="40" y="139" width="26" height="18" rx="4"/>
      <rect x="121" y="154" width="34" height="18" rx="4"/>
    </g>
    <g stroke="#f8fbff" stroke-width="2" stroke-linecap="round">
      <path d="M47 52 H59"/>
      <path d="M47 148 H59"/>
      <path d="M128 163 H148"/>
