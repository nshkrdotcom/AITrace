    <g filter="url(#aitrace-glow)">
      <path d="M42 100 C58 72 78 59 100 59 C122 59 142 72 158 100 C142 128 122 141 100 141 C78 141 58 128 42 100 Z" fill="#0b1220" stroke="url(#aitrace-lens)" stroke-width="4"/>
      <circle cx="100" cy="100" r="29" fill="none" stroke="#91f7ff" stroke-width="4"/>
      <circle cx="100" cy="100" r="12" fill="url(#aitrace-lens)"/>
      <path d="M96 91 L110 100 L96 109 Z" fill="#0b1220"/>
    </g>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
